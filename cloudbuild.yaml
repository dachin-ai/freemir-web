# Default CI/CD — split Cloud Run (frontend + API). Trigger uses this file.
# For single-service deploy later, switch trigger to cloudbuild.unified.yaml
steps:
  # ── BACKEND ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - build
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/${_BACKEND_IMAGE}:$COMMIT_SHA'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - push
      - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/${_BACKEND_IMAGE}:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_BACKEND_SERVICE}'
      - '--image=asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/${_BACKEND_IMAGE}:$COMMIT_SHA'
      - '--region=asia-southeast1'
      - '--allow-unauthenticated'
      - '--set-env-vars=DATABASE_URL=${_DATABASE_URL},JWT_SECRET=${_JWT_SECRET},OPENAI_API_KEY=${_OPENAI_API_KEY},OPENAI_BASE_URL=${_OPENAI_BASE_URL},OPENAI_MODEL=${_OPENAI_MODEL}'
      - '--set-secrets=/etc/secrets/credentials.json=credentials-json:latest'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=600'
      - '--memory=2Gi'
      - '--quiet'

  # ── FRONTEND (VITE_API_URL → backend Cloud Run URL) ──
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - build
      - '--build-arg'
      - 'VITE_API_URL=${_VITE_API_URL}'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/${_FRONTEND_IMAGE}:$COMMIT_SHA'
      - './frontend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - push
      - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/${_FRONTEND_IMAGE}:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_FRONTEND_SERVICE}'
      - '--region=asia-southeast1'
      - '--allow-unauthenticated'
      - '--image=asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/${_FRONTEND_IMAGE}:$COMMIT_SHA'
      - '--quiet'

images:
  - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/${_BACKEND_IMAGE}:$COMMIT_SHA'
  - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/${_FRONTEND_IMAGE}:$COMMIT_SHA'

timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _BACKEND_SERVICE: 'freemir-web-api'
  _FRONTEND_SERVICE: 'freemir-web'
  _BACKEND_IMAGE: 'freemir-web-api'
  _FRONTEND_IMAGE: 'freemir-web'
  _VITE_API_URL: 'https://freemir-web-api-123563250077.asia-southeast1.run.app/api'
  _JWT_SECRET: 'freemir_antigravity_2026_prod_secret'
  _DATABASE_URL: 'postgresql://dena_admin:AntiGrav2026Secure@35.198.222.19:5432/antigravity_db'
  _OPENAI_API_KEY: ''
  _OPENAI_BASE_URL: 'https://ai.sumopod.com/v1'
  _OPENAI_MODEL: 'gpt-4o-mini'
